name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate synthetic fixtures
        run: pnpm fixtures

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (TS + native arm64)
        run: pnpm build

      - name: Test (TypeScript, default path with native module)
        run: pnpm test

      - name: Test (Rust native — pure unit tests, no fixtures)
        run: pnpm test:rust

      - name: Test (TS-only fallback path, IMSG_DISABLE_NATIVE=1)
        run: pnpm test:no-native

      - name: Verify npm tarball is publishable
        run: npm pack --dry-run

      # ── e2e stress: 250k messages, 1200 chats, watchdog under load ──
      # Generates a heavy synthetic fixture (top 5 chats × 20k messages,
      # 1100 long-tail), then runs the headless TUI workload while
      # externally sampling RSS / CPU / event-loop p99 lag once per second.
      # Fails the job on threshold breach; emits ::warning on softer ones.
      - name: Generate stress fixture (250k messages, 1200 chats)
        run: pnpm fixtures:stress

      - name: Stress test TUI / data path (60s)
        env:
          IMSG_STRESS_TUI_DURATION_S: "60"
        run: pnpm stress:tui

      - name: Upload stress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-tui-report
          path: stress-tui-report.json
          if-no-files-found: warn
