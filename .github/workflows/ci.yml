name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate synthetic fixtures
        run: pnpm fixtures

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (TS + native arm64)
        run: pnpm build

      - name: Test (TypeScript, default path with native module)
        run: pnpm test

      - name: Test (Rust native — pure unit tests, no fixtures)
        run: pnpm test:rust

      - name: Test (TS-only fallback path, IMSG_DISABLE_NATIVE=1)
        run: pnpm test:no-native

      - name: Verify npm tarball is publishable
        run: npm pack --dry-run
