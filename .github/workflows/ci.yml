name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # VITE_ENV=local so sendMessage/checkMessagesAvailable use the AppleScript path; tests mock
      # child_process.execFile. VITE_ENV=ai sets MOCK in applescript.ts and never calls execFile, so
      # those unit tests would fail. Runtime "ai" mocking (env-data DBs) is for the MCP server, not this suite.
      - name: Test
        env:
          VITE_ENV: local
        run: pnpm test
