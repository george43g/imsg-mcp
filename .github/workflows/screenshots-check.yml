name: screenshots-check

on:
  pull_request:
    paths:
      - 'src/tui/**'
      - 'scripts/screenshots/*.tape'
      - 'docs/screenshots/**'
      - '.github/workflows/screenshots-check.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 15
    # vhs + font rendering is non-deterministic at the byte level — running
    # `pnpm screenshots:check` twice in a row on the same machine produces
    # drift in the resulting PNGs. The check is useful as a "did the TUI
    # surface change?" signal, but cannot be a hard gate without a tolerant
    # image-diff (pixelmatch / ImageMagick `compare -metric AE`). The drift
    # step is therefore REPORT-ONLY (warning annotation + file list, exit 0):
    # job-level continue-on-error alone still painted a red X on the PR
    # checks list even though the workflow run succeeded. continue-on-error
    # stays to absorb infra flakiness (brew/vhs/font installs). Track a
    # follow-up: replace byte-equality with a threshold-based pixel diff.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install JetBrains Mono
        run: |
          brew tap homebrew/cask-fonts || true
          brew install --cask font-jetbrains-mono
          fc-cache -f

      - name: Install vhs
        run: brew install vhs

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/Library/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Regenerate fixtures (test mode)
        run: pnpm fixtures

      - name: Regenerate screenshots
        run: pnpm screenshots

      - name: Report drift (informational)
        run: |
          if ! git diff --quiet -- docs/screenshots/; then
            echo "::warning::Screenshots drifted from source (byte-level; often vhs render noise). If the TUI surface changed intentionally, run 'pnpm screenshots' locally and commit the result."
            echo ""
            echo "Drifted files:"
            git diff --name-only -- docs/screenshots/
          else
            echo "✓ screenshots match source"
          fi
